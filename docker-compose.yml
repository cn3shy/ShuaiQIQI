version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: shuaiqi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shuaiqi
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - shuaiqi-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: shuaiqi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - shuaiqi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Nacos 注册中心
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: shuaiqi-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      - shuaiqi-network
    depends_on:
      mysql:
        condition: service_healthy

  # Gateway 网关
  gateway:
    build:
      context: ./backend
      dockerfile: gateway/Dockerfile
    container_name: shuaiqi-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_REDIS_HOST: redis
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/shuaiqi?useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - shuaiqi-network
    depends_on:
      - nacos
      - mysql
      - redis

  # Auth Service 认证服务
  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: shuaiqi-auth
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_REDIS_HOST: redis
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/shuaiqi?useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - shuaiqi-network
    depends_on:
      - nacos
      - mysql
      - redis

  # User Service 用户服务
  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
    container_name: shuaiqi-user
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_REDIS_HOST: redis
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/shuaiqi?useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - shuaiqi-network
    depends_on:
      - nacos
      - mysql
      - redis

  # Content Service 内容服务
  content-service:
    build:
      context: ./backend
      dockerfile: content-service/Dockerfile
    container_name: shuaiqi-content
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_REDIS_HOST: redis
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/shuaiqi?useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - shuaiqi-network
    depends_on:
      - nacos
      - mysql
      - redis

  # Comment Service 评论服务
  comment-service:
    build:
      context: ./backend
      dockerfile: comment-service/Dockerfile
    container_name: shuaiqi-comment
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_REDIS_HOST: redis
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/shuaiqi?useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - shuaiqi-network
    depends_on:
      - nacos
      - mysql
      - redis

  # Notification Service 通知服务
  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    container_name: shuaiqi-notification
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_REDIS_HOST: redis
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/shuaiqi?useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - shuaiqi-network
    depends_on:
      - nacos
      - mysql
      - redis

  # Zipkin 链路追踪
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: shuaiqi-zipkin
    ports:
      - "9411:9411"
    networks:
      - shuaiqi-network

  # Frontend 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shuaiqi-frontend
    ports:
      - "3000:80"
    networks:
      - shuaiqi-network
    depends_on:
      - gateway

networks:
  shuaiqi-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  nacos-data:
