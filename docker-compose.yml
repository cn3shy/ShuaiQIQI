version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shuaiqi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shuaiqi
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - shuaiqi-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: shuaiqi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - shuaiqi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shuaiqi-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/shuaiqi?useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: redis
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-shuaiqi-secret-key-change-in-production}
    networks:
      - shuaiqi-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shuaiqi-frontend
    ports:
      - "3000:80"
    networks:
      - shuaiqi-network
    depends_on:
      - backend

networks:
  shuaiqi-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
