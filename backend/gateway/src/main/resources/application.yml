server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yml

    gateway:
      discovery:
        locator:
          enabled: true  # 开启服务发现
          lower-case-service-id: true  # 小写服务名

      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        - id: content-service
          uri: lb://content-service
          predicates:
            - Path=/api/content/**
        - id: comment-service
          uri: lb://comment-service
          predicates:
            - Path=/api/comment/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notification/**
